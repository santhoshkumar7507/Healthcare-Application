<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AuraHealth — Login</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23161b22'/><path d='M30 40 L50 70 L70 40' stroke='%23bc8cff' stroke-width='12' stroke-linecap='round' stroke-linejoin='round' fill='none'/><circle cx='50' cy='20' r='8' fill='%233fb950'/></svg>" />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
[data-theme="dark"]{
  --bg:#040609;--bg2:#0b0e14;--bg3:#12161f;--sur:rgba(15,20,29,0.7);--sur2:rgba(26,33,46,0.6);
  --brd:rgba(255,255,255,0.08);--brd2:rgba(255,255,255,0.12);
  --tx:#f0f2f5;--tx2:#94a3b8;--tx3:#64748b;
  --ac:#00d2ff;--acg:rgba(0,210,255,0.15);--ac2:#10b981;
  --vl:#a855f7;
  --gl:linear-gradient(135deg, var(--ac), var(--vl));
}
[data-theme="light"]{
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--sur:rgba(255,255,255,0.8);--sur2:rgba(248,250,252,0.7);
  --brd:rgba(0,0,0,0.06);--brd2:rgba(0,0,0,0.1);
  --tx:#0f172a;--tx2:#64748b;--tx3:#94a3b8;
  --ac:#0ea5e9;--acg:rgba(14,165,233,0.1);--ac2:#10b981;
  --vl:#8b5cf6;
  --gl:linear-gradient(135deg, var(--ac), var(--vl));
}

*{margin:0;padding:0;box-sizing:border-box;transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);}
body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}

/* ── LIVING AMBIENT BACKGROUND ── */
.ambient{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.2;animation:drift 30s infinite linear alternate;}
.o1{width:600px;height:600px;background:var(--ac);top:-200px;left:-200px;}
.o2{width:500px;height:500px;background:var(--vl);bottom:-150px;right:-150px;animation-duration:25s;animation-delay:-5s;}
.o3{width:400px;height:400px;background:var(--ac2);top:20%;right:10%;animation-duration:35s;animation-delay:-12s;opacity:0.1;}
@keyframes drift{0%{transform:translate(0,0) scale(1) rotate(0deg);}50%{transform:translate(10vw, 10vh) scale(1.2) rotate(90deg);}100%{transform:translate(-5vw, 15vh) scale(0.9) rotate(180deg);}}

/* ── LOGO ── */
.logo{display:flex;align-items:center;justify-content:center;gap:16px;text-decoration:none;margin-bottom:40px;}
.logo svg{width:54px;height:54px;filter:drop-shadow(0 0 15px var(--acg));transition:transform 0.5s ease;}
.logo:hover svg{transform:scale(1.1) rotate(5deg);}
.logo-name{font-size:32px;font-weight:800;color:var(--tx);letter-spacing:-1px;}
.logo-name em{background:var(--gl);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal;}
.logo-tag{font-size:11px;color:var(--tx3);letter-spacing:3px;text-transform:uppercase;margin-top:4px;font-weight:700;}

/* ── AUTH BOX ── */
.auth-box{position:relative;z-index:1;width:100%;max-width:460px;background:var(--sur);border:1px solid var(--brd);border-radius:32px;padding:54px;box-shadow:0 40px 100px rgba(0,0,0,0.5);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);animation:boxIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);}
@keyframes boxIn{from{opacity:0;transform:scale(0.95) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
.auth-box::before{content:'';position:absolute;inset:0;border-radius:32px;padding:1px;background:linear-gradient(135deg, rgba(255,255,255,0.1), transparent, rgba(255,255,255,0.05));-webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}

.title{font-size:26px;font-weight:800;margin-bottom:10px;letter-spacing:-0.5px;}
.subtitle{font-size:14px;color:var(--tx2);margin-bottom:32px;line-height:1.5;}

/* ── TABS ── */
.tabs{display:flex;background:var(--bg3);padding:6px;border-radius:16px;margin-bottom:32px;border:1px solid var(--brd);}
.tab{flex:1;text-align:center;padding:14px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;color:var(--tx2);user-select:none;transition:all .2s;}
.tab.active{background:var(--sur);color:var(--ac);box-shadow:0 8px 25px rgba(0,0,0,.25);border:1px solid var(--brd);}
.tab:hover:not(.active){color:var(--tx);background:rgba(255,255,255,0.04);}

/* ── FORM ── */
.form-group{margin-bottom:24px;}
.label{display:block;font-size:11px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}
.input-field{width:100%;background:var(--sur2);border:2px solid var(--brd2);border-radius:16px;padding:16px 20px;font-size:15px;color:var(--tx);font-family:'Outfit',sans-serif;outline:none;transition:all .2s;}
.input-field:focus{border-color:var(--ac);box-shadow:0 0 25px var(--acg);background:var(--bg3);}

.btn{width:100%;padding:18px;border-radius:16px;border:none;background:var(--gl);color:#fff;font-size:16px;font-weight:800;font-family:'Outfit',sans-serif;cursor:pointer;margin-top:16px;box-shadow:0 15px 35px rgba(0,210,255,0.3);position:relative;overflow:hidden;transition:all .3s;}
.btn:hover{transform:translateY(-3px);box-shadow:0 20px 45px rgba(0,210,255,0.4);}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);transform:translateX(-100%);transition:transform 0.7s ease;}
.btn:hover::after{transform:translateX(100%);}
.btn:active{transform:scale(0.98);}

.error-box{display:none;padding:16px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:14px;color:#ef4444;font-size:13px;font-weight:700;margin-bottom:28px;text-align:center;backdrop-filter:blur(5px);}
.error-box.show{display:block;animation:shake 0.4s cubic-bezier(.36,.07,.19,.97) both;}
@keyframes shake{10%,90%{transform:translate3d(-1px,0,0)}20%,80%{transform:translate3d(2px,0,0)}30%,50%,70%{transform:translate3d(-4px,0,0)}40%,60%{transform:translate3d(4px,0,0)}}

.view{display:none;}
.view.active{display:block;animation:fadeUp .5s cubic-bezier(0.22, 1, 0.36, 1);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="ambient">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
</div>

<div class="auth-box">
  <div class="logo">
    <svg viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="var(--ac)" />
          <stop offset="100%" stop-color="var(--vl)" />
        </linearGradient>
      </defs>
      <circle cx="17" cy="17" r="16" stroke="url(#logoGrad)" stroke-width="1.5" stroke-dasharray="2 2" opacity="0.3"/>
      <path d="M8 17H12L14 11L18 23L20 17H26" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="17" cy="17" r="17" fill="url(#logoGrad)" opacity="0.05"/>
    </svg>
    <div>
      <div class="logo-name">Aura<em>Health</em></div>
      <div class="logo-tag">Universal Wellness Intelligence</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('register')">Create Account</div>
  </div>

  <div id="error-msg" class="error-box"></div>

  <!-- Login Form -->
  <form id="login-form" class="view active" onsubmit="handleLogin(event)">
    <div class="title">Welcome back</div>
    <div class="subtitle">Enter your credentials to access your dashboard.</div>
    <div class="form-group">
      <label class="label">Email Address</label>
      <input type="email" id="l-email" class="input-field" placeholder="you@example.com" required/>
    </div>
    <div class="form-group">
      <label class="label">Password</label>
      <input type="password" id="l-pass" class="input-field" placeholder="••••••••" required/>
    </div>
    <button type="submit" class="btn">Sign In to Dashboard</button>
  </form>

  <!-- Register Form -->
  <form id="register-form" class="view" onsubmit="handleRegister(event)">
    <div class="title">Create an Account</div>
    <div class="subtitle">Start managing your disease risk locally.</div>
    <div class="form-group">
      <label class="label">Full Name</label>
      <input type="text" id="r-name" class="input-field" placeholder="Arjun Rajan" required/>
    </div>
    <div class="form-group">
      <label class="label">Email Address</label>
      <input type="email" id="r-email" class="input-field" placeholder="you@example.com" required/>
    </div>
    <div class="form-group">
      <label class="label">Password</label>
      <input type="password" id="r-pass" class="input-field" placeholder="Create a strong password" required/>
    </div>
    <button type="submit" class="btn">Register Securely</button>
  </form>
</div>

<script>
// ── BRAND MIGRATION ────────────────────────────────────
['token', 'email', 'name'].forEach(k => {
  const old = localStorage.getItem('vitalens_' + k);
  if (old && !localStorage.getItem('aura_' + k)) {
    localStorage.setItem('aura_' + k, old);
    localStorage.removeItem('vitalens_' + k);
  }
});

const errBox = document.getElementById('error-msg');
const API_URL = 'https://healthcare-application-1wcd.onrender.com';

function switchTab(tab) {
  errBox.classList.remove('show');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  
  if(tab === 'login') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('login-form').classList.add('active');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('register-form').classList.add('active');
  }
}

function showError(msg) {
  errBox.textContent = msg;
  errBox.classList.add('show');
}

async function handleLogin(e) {
  e.preventDefault();
  errBox.classList.remove('show');
  const btn = e.target.querySelector('button');
  btn.textContent = 'Authenticating...';
  
  const email = document.getElementById('l-email').value;
  const pass = document.getElementById('l-pass').value;

  try {
    const formData = new URLSearchParams();
    formData.append('username', email); // OAuth2 expects 'username' field
    formData.append('password', pass);

    const res = await fetch(`${API_URL}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: formData
    });

    const data = await res.json();
    if(res.ok && data.access_token) {
      localStorage.setItem('aura_token', data.access_token);
      localStorage.setItem('aura_email', email);
      if(data.name) localStorage.setItem('aura_name', data.name);
      window.location.href = 'index.html'; // Redirect to dashboard
    } else {
      showError(data.detail || 'Invalid credentials. Have you created an account?');
      btn.textContent = 'Sign In to Dashboard';
    }
  } catch (err) {
    showError('Unable to connect to the backend server (AuraHealth API). Please check your internet.');
    btn.textContent = 'Sign In to Dashboard';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  errBox.classList.remove('show');
  const btn = e.target.querySelector('button');
  btn.textContent = 'Creating Account...';

  const name = document.getElementById('r-name').value;
  const email = document.getElementById('r-email').value;
  const pass = document.getElementById('r-pass').value;

  if(!pass || pass.length < 5) {
    showError("Password must be at least 5 characters long.");
    btn.textContent = 'Register Securely';
    return;
  }

  try {
    const res = await fetch(`${API_URL}/api/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password: pass })
    });

    const data = await res.json();
    if(res.ok) {
      // Auto-login directly
      const formData = new URLSearchParams();
      formData.append('username', email);
      formData.append('password', pass);
      const loginRes = await fetch(`${API_URL}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData
      });
      const loginData = await loginRes.json();
      if(loginRes.ok && loginData.access_token) {
        localStorage.setItem('aura_token', loginData.access_token);
        localStorage.setItem('aura_email', email);
        localStorage.setItem('aura_name', loginData.name || name);
        window.location.href = 'index.html';
      } else {
        switchTab('login');
      }
    } else {
      showError(data.detail || 'Registration failed. Try a different email.');
      btn.textContent = 'Register Securely';
    }
  } catch (err) {
    showError('Unable to connect to the backend server. Is it running?');
    btn.textContent = 'Register Securely';
  }
}

// Redirect if already logged in
if(localStorage.getItem('aura_token')) {
  console.log("AuraHealth: Token found, redirecting to dashboard...");
  window.location.replace('index.html');
}
</script>
</body>
</html>
